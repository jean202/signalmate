services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: signalmate-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: signalmate
      POSTGRES_USER: signalmate
      POSTGRES_PASSWORD: signalmate_local
    volumes:
      - signalmate-pgdata:/var/lib/postgresql/data

volumes:
  signalmate-pgdata:
